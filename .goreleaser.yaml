version: 2

builds:
  - main: ./cmd/orx
    binary: orx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: scripts/orx-ralphex-review
        dst: orx-ralphex-review

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: orx
    repository:
      owner: iatsiuk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/iatsiuk/orx-cli"
    description: "CLI tool for querying multiple LLMs in parallel via OpenRouter"
    binaries:
      - orx
      - orx-ralphex-review
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-d", "com.apple.quarantine", "#{staged_path}/orx"]
    caveats: |
      Quarantine attribute (com.apple.quarantine) is automatically removed
      from the orx binary during installation to prevent Gatekeeper warnings.
      See: https://github.com/Homebrew/brew/issues/20755

      To uninstall:
        brew uninstall --cask orx

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
